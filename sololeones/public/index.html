<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoloLeones | Contenido viral</title>

<meta name="description" content="Publica contenido viral y comparte ideas impactantes.">
<meta name="keywords" content="blog, viral, contenido">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

</header>

</form>

<h2>Publicaciones</h2>
<div id="posts"></div>

</div>

<script src="app.js"></script>
