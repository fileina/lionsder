<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A collection of 20 amazing posts. Learn more about various topics with lionsder branding.">
    <meta name="keywords" content="lionsder, posts, blog, contact">
    <meta name="author" content="fileina">
    <title>Lionsder - 20 Posts Collection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="sticky-nav">
            <div class="logo">Lionsder</div>
            <ul>
                <li><a href="#posts">Home</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="posts">
        <h1>Welcome to the 20 Posts Collection</h1>
        <article> <!-- Post 1 -->
            <h2>Post Title 1</h2>
            <p>Content for post 1...</p>
        </article>
        <article> <!-- Post 2 -->
            <h2>Post Title 2</h2>
            <p>Content for post 2...</p>
        </article>
        <!-- Repeat for all 20 posts -->
        <article> <!-- Post 20 -->
            <h2>Post Title 20</h2>
            <p>Content for post 20...</p>
        </article>
    </main>

    <footer id="contact">
        <h2>Contact Us</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </footer>

    <script src="script.js"></script>
</body>
</html>
