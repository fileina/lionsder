<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoloLeones | Plataforma</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}

.header {
  text-align: center;
  padding: 30px 0;
  border-bottom: 2px solid #00ffcc;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 2.5em;
  margin: 0;
  color: #00ffcc;
}

.auth-section {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.auth-section h2 {
  text-align: center;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
  color: #00ffcc;
}

input[type="email"],
input[type="password"],
input[type="text"],
textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #00ffcc;
  border-radius: 5px;
  background: #222;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 1em;
}

input[type="email"]:focus,
input[type="password"]:focus,
input[type="text"]:focus,
textarea:focus {
  outline: none;
  border-color: #00ffcc;
  box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ffcc;
  color: black;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
  font-size: 1em;
  transition: 0.3s;
  margin-bottom: 10px;
}

button:hover {
  background: #00e6b8;
  transform: translateY(-2px);
}

.btn-secondary {
  background: #666;
  color: white;
  width: auto;
  padding: 10px 20px;
  margin-bottom: 0;
}

.btn-secondary:hover {
  background: #888;
}

.app-section {
  display: none;
}

.posts-container {
  margin-top: 20px;
}

.post {
  background: #1a1a1a;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  border-left: 4px solid #00ffcc;
}

.post h3 {
  margin-top: 0;
  color: #00ffcc;
}

.post p {
  margin: 10px 0;
  line-height: 1.6;
}

.post small {
  color: #aaa;
  font-style: italic;
}

.user-info {
  text-align: right;
  padding: 10px;
  background: #111;
  border-radius: 5px;
  margin-bottom: 20px;
}

.hidden {
  display: none !important;
}

.error {
  background: #ff4444;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  display: none;
  color: white;
}

.success {
  background: #44ff44;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  color: black;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="header">
    <h1>🦁 SoloLeones</h1>
    <p>Plataforma de contenido viral</p>
  </div>

  <div id="authSection" class="auth-section">
    <h2>Acceso a la Plataforma</h2>
    
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email" id="email" placeholder="tu@email.com">
    </div>

    <div class="form-group">
      <label>Contraseña:</label>
      <input type="password" id="password" placeholder="Contraseña segura">
    </div>

    <button onclick="login()">Entrar</button>
    <button onclick="register()" class="btn-secondary">Crear cuenta</button>
  </div>

  <div id="appSection" class="app-section">
    
    <div class="user-info">
      Bienvenido: <strong id="currentUserDisplay"></strong>
      <button onclick="logout()" class="btn-secondary">Cerrar sesión</button>
    </div>

    <h2>📝 Crear Publicación</h2>
    
    <div class="form-group">
      <label>Título:</label>
      <input type="text" id="title" placeholder="Título de tu publicación">
    </div>

    <div class="form-group">
      <label>Contenido:</label>
      <textarea id="content" placeholder="Escribe tu contenido aquí..."></textarea>
    </div>

    <button onclick="createPost()">Publicar</button>

    <h2>📰 Publicaciones Recientes</h2>
    <div id="postsContainer" class="posts-container"></div>
  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("sololeones_users")) || [];
let posts = JSON.parse(localStorage.getItem("sololeones_posts")) || [];
let currentUser = localStorage.getItem("sololeones_user");

window.onload = function() {
  if (currentUser) {
    showApp();
  }
};

function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  
  if (!email || !password) {
    showError("Por favor completa todos los campos");
    return;
  }

  if (users.find(u => u.email === email)) {
    showError("Este email ya está registrado");
    return;
  }

  users.push({ email, password });
  localStorage.setItem("sololeones_users", JSON.stringify(users));
  showSuccess("Cuenta creada. Ahora inicia sesión");
  
  setTimeout(() => {
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
  }, 1000);
}

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showError("Por favor completa todos los campos");
    return;
  }

  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    localStorage.setItem("sololeones_user", email);
    currentUser = email;
    showSuccess("¡Bienvenido!");
    setTimeout(showApp, 1000);
  } else {
    showError("Email o contraseña incorrectos");
  }
}

function logout() {
  localStorage.removeItem("sololeones_user");
  currentUser = null;
  location.reload();
}

function showApp() {
  document.getElementById("authSection").classList.add("hidden");
  document.getElementById("appSection").classList.remove("hidden");
  document.getElementById("currentUserDisplay").textContent = currentUser;
  loadPosts();
}

function createPost() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title || !content) {
    showError("Completa título y contenido");
    return;
  }

  posts.unshift({
    id: Date.now(),
    title,
    content,
    author: currentUser,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("sololeones_posts", JSON.stringify(posts));
  
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  
  showSuccess("¡Publicación creada!");
  loadPosts();
}

function loadPosts() {
  const container = document.getElementById("postsContainer");
  
  if (posts.length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#aaa;'>Aún no hay publicaciones. ¡Sé el primero!</p>";
    return;
  }

  container.innerHTML = posts.map(post => `
    <div class="post">
      <h3>${escapeHtml(post.title)}</h3>
      <p>${escapeHtml(post.content)}</p>
      <small>Por: <strong>${escapeHtml(post.author)}</strong> | ${post.date}</small>
    </div>
  `).join("");
}

function showError(msg) {
  const errorDiv = document.getElementById("errorMsg");
  errorDiv.textContent = msg;
  errorDiv.style.display = "block";
  setTimeout(() => {
    errorDiv.style.display = "none";
  }, 5000);
}

function showSuccess(msg) {
  const successDiv = document.getElementById("successMsg");
  successDiv.textContent = msg;
  successDiv.style.display = "block";
  setTimeout(() => {
    successDiv.style.display = "none";
  }, 5000);
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}
</script>

</body>
</html>
