<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An awesome website that showcases a variety of lions and their habitats.">
    <meta name="keywords" content="lions, wildlife, nature, conservation">
    <meta name="author" content="Fileina">
    <title>Lions of the World</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Improved button styling */
        .button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #45a049;
        }
        /* Sticky navigation styles */
        nav {
            position: sticky;
            top: 0;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Media queries for responsiveness */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <main>
        <!-- Functional contact form -->
        <section id="contact">
            <h2>Contact Us</h2>
            <form action="/submit" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button class="button" type="submit">Send</button>
            </form>
        </section>
        <!-- 20 posts from new code along with improvements -->
        <section id="posts">
            <h2>Latest Posts</h2>
            <article>
                <h3>Post Title 1</h3>
                <p>Content for post 1...</p>
            </article>
            <article>
                <h3>Post Title 2</h3>
                <p>Content for post 2...</p>
            </article>
            <!-- More posts... -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Lions of the World. All rights reserved.</p>
    </footer>
</body>
</html>
