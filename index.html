<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionsder</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button id="mode-toggle">Toggle Dark/Light Mode</button>
        </nav>
    </header>

    <main>
        <section id="home">
            <h1>Welcome to Lionsder</h1>
            <p>Your journey to excellence starts here!</p>
        </section>

        <section id="about">
            <h2>About Us</h2>
            <p>We are dedicated to providing top-notch services.</p>
        </section>

        <section id="services">
            <h2>Our Services</h2>
            <p>Explore the range of services we offer.</p>
        </section>

        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <label for="message">Message:</label>
                <textarea id="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Lionsder. All rights reserved.</p>
    </footer>

    <script>
        // Dark/Light Mode Toggle
        const toggle = document.getElementById('mode-toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
